    <!-- Ранний маяк прихода в приложение (app_page_hit): срабатывает при разборе
         HTML, ДО загрузки тяжёлого бандла, через sendBeacon — поэтому фиксирует
         даже тех, кто ушёл во время загрузки JS. Только для рекламного трафика
         (utm/ref/seg), один раз на сессию. Тот же session_id, что у eventsClient
         → воронку app_page_hit→landing_view→otp→signup можно склеить по сессии.
         Нужно, чтобы отличить «не доехал до app» от «доехал, но отвалился на загрузке». -->
    <script type="text/javascript">
      (function () {
        try {
          var p = new URLSearchParams(location.search);
          var src = 'direct';
          if (p.get('utm_source') || p.get('utm_campaign')) {
            src = 'utm:' + (p.get('utm_source') || p.get('utm_campaign'));
            if (p.get('utm_medium')) src += '/' + p.get('utm_medium');
          } else if (p.get('ref')) {
            src = 'referral:' + p.get('ref');
          }
          if (src === 'direct' && !p.get('seg')) return; // шумим только на рекламном трафике
          var KEY = 'linkeon_app_hit';
          if (sessionStorage.getItem(KEY)) return;
          sessionStorage.setItem(KEY, '1');
          var sid = sessionStorage.getItem('linkeon_session_id');
          if (!sid) {
            sid = 's_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10);
            sessionStorage.setItem('linkeon_session_id', sid);
          }
          var body = JSON.stringify({
            name: 'app_page_hit',
            sessionId: sid,
            source: src,
            props: {
              seg: p.get('seg') || null,
              campaign: [p.get('utm_campaign'), p.get('utm_content')].filter(Boolean).join('/') || null
            }
          });
          if (navigator.sendBeacon) {
            navigator.sendBeacon('/webhook/events/track', new Blob([body], { type: 'application/json' }));
          } else {
            fetch('/webhook/events/track', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: body, keepalive: true });
          }
        } catch (e) { /* маяк не ломает загрузку */ }
      })();
    </script>
